services:
  postgres:
    image: postgres:16-alpine
    container_name: ner-postgres
    restart: unless-stopped
    ports:
      - "6655:5432"
    environment:
      POSTGRES_DB: multi_entity_ner
      POSTGRES_USER: ner
      POSTGRES_PASSWORD: ner
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - ner_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ner -d multi_entity_ner"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  ner_pg_data:
